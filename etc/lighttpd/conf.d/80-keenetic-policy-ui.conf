# Keenetic Policy UI — lighttpd configuration
# Serves the SPA frontend on port 3000 and dispatches API requests to PHP-CGI.
#
# Direct access: http://router:3000/
#
# lighttpd modules required: mod_cgi, mod_setenv, mod_rewrite
server.port := 8088

$HTTP["host"] =~ "^(.+):8088$" {
    url.redirect = ( "^/keenetic-policy-ui/" => "http://%1:3000" )
    url.redirect-code = 301
}

# Main app on port 3000
$SERVER["socket"] == ":3000" {
    # PHP-CGI handler
    cgi.assign += ( ".php" => "/opt/bin/php-cgi" )
    static-file.exclude-extensions += (".php")

    # Environment for PHP
    setenv.set-environment = (
        "PATH" => "/opt/sbin:/opt/bin:/opt/usr/sbin:/opt/usr/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    )

    # SPA fallback — any missing file serves index.html
    index-file.names = ( "index.html" )
    server.error-handler-404 = "/keenetic-policy-ui/index.html"

    # Rewrite rules:
    #   /api/* → PHP handler
    #   /*     → serve from /opt/share/www/keenetic-policy-ui/
    url.rewrite-once = (
        "^/api/(.*)$" => "/keenetic-policy-ui/api/index.php",
        "^/(.*)$"     => "/keenetic-policy-ui/$1"
    )
}
