; Keenetic Policy UI configuration
; Parsed by PHP parse_ini_file() — sections map to array keys.

[router]
; RCI API base URL — no auth needed when running on the router itself
rci_url = http://127.0.0.1:79

[auth]
; Require frontend login (challenge-response via router's web UI auth)
enabled = true
; JWT signing secret — leave empty for auto-generated on first run
jwt_secret =
; Static API token for headless/script access (X-API-Token header).
; Leave empty to disable.
api_token =

[app]
; Path to the policy configuration JSON file
policies_file = /opt/etc/keenetic-policy-ui/policies.json
; Log level: silent, error, warn, info, debug
; Logs sent to syslog — view: logread | grep keenetic-policy-ui
; File logging: set path to enable, leave empty to use syslog only
log_file =
log_level = info
