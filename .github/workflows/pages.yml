name: Deploy opkg repo to Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Download all release assets
        run: |
          mkdir -p repo
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir repo
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate Packages index
        run: |
          cd repo
          set +e
          for ipk in *.ipk; do
            [ -f "$ipk" ] || continue
            tar -xzf "$ipk" control.tar.gz 2>/dev/null || continue
            [ -f control.tar.gz ] || continue
            tar xzf control.tar.gz ./control
            [ -f control ] || { rm -f control.tar.gz; continue; }

            PKG_NAME=$(grep '^Package:' control | awk '{print $2}')
            PKG_VER=$(grep '^Version:' control | awk '{print $2}')
            PKG_DEPS=$(grep '^Depends:' control | awk '{print $2}')
            PKG_ARCH=$(grep '^Architecture:' control | awk '{print $2}')
            PKG_SIZE=$(stat -c%s "$ipk")
            PKG_MD5=$(md5sum "$ipk" | awk '{print $1}')

            rm -f control.tar.gz control

            {
              echo "Package: $PKG_NAME"
              echo "Version: $PKG_VER"
              echo "Depends: $PKG_DEPS"
              echo "License: MIT"
              echo "Architecture: $PKG_ARCH"
              echo "Filename: $ipk"
              echo "Size: $PKG_SIZE"
              echo "MD5sum: $PKG_MD5"
              echo ""
            } >> Packages
          done
          set -e

          if [ ! -f Packages ]; then
            echo "No valid ipk packages found"
            exit 1
          fi

          gzip -c Packages > Packages.gz
        shell: bash

      - name: Generate HTML repository index
        run: |
          cd repo
          cat > index.html <<'HEADER'
          <html><head><title>opkg Repository</title></head><body>
          <h1>Index of /</h1><hr>
          <pre>
          HEADER

          # Always list Packages files if they exist
          [ -f Packages ]    && echo '<a href="Packages">Packages</a>'       >> index.html
          [ -f Packages.gz ] && echo '<a href="Packages.gz">Packages.gz</a>' >> index.html

          # List all .ipk packages, sorted by name
          for ipk in $(ls -1 *.ipk 2>/dev/null | sort); do
            echo "<a href=\"$ipk\">$ipk</a>" >> index.html
          done

          cat >> index.html <<'FOOTER'
          </pre>
          <hr></body></html>
          FOOTER
        shell: bash

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
